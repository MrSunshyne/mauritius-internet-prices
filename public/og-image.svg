<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#fdfdfd"/>
  
  <!-- Sidebar Branding Area -->
  <rect width="80" height="630" fill="#ffffff"/>
  <line x1="80" y1="0" x2="80" y2="630" stroke="#eeeeee" stroke-width="1"/>
  
  <!-- Text in Sidebar (Rotated) -->
  <text transform="translate(45, 315) rotate(-90)" font-family="serif" font-size="12" font-weight="800" letter-spacing="0.2em" fill="#888888" text-anchor="middle">
    THE DATA REPORT / 2026
  </text>
  
  <!-- Main Content Area -->
  <g transform="translate(160, 150)">
    <!-- Main Title -->
    <text y="0" font-family="serif" font-size="80" font-weight="400" fill="#1a1a1a" letter-spacing="-0.02em">
      The State of
    </text>
    <text y="90" font-family="serif" font-size="80" font-style="italic" font-weight="400" fill="#1a1a1a" letter-spacing="-0.02em">
      Mobile Data
    </text>
    <text y="180" font-family="serif" font-size="80" font-weight="400" fill="#1a1a1a" letter-spacing="-0.02em">
      in Mauritius.
    </text>
    
    <!-- Subtitle / Description -->
    <text y="260" font-family="sans-serif" font-size="20" fill="#555555" line-height="1.5">
      Independent analysis and comparative pricing of all major
    </text>
    <text y="295" font-family="sans-serif" font-size="20" fill="#555555" line-height="1.5">
      telecommunication networks. Objectively ranked.
    </text>
    
    <!-- Operator Color Accents (Small squares at the bottom) -->
    <g transform="translate(0, 360)">
      <rect width="40" height="4" fill="#5FAEE3" rx="0"/> <!-- my.t -->
      <rect x="60" width="40" height="4" fill="#FF0000" rx="0"/> <!-- Emtel -->
      <rect x="120" width="40" height="4" fill="#FF0088" rx="0"/> <!-- CHILI -->
    </g>
  </g>
  
  <!-- "Issue No" at bottom right -->
  <text x="1140" y="580" font-family="sans-serif" font-size="12" font-weight="800" fill="#1a1a1a" text-anchor="end">
    ISSUE NO. 01 / MARCH 2026
  </text>
</svg>
